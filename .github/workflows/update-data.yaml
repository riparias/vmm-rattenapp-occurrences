on:
  schedule:
    - cron: "0 3 * * *"

  push:
    branches:
      - main
    paths:
      - data/raw/**

  workflow_dispatch:

name: update-data

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: update-data
  cancel-in-progress: true
jobs:
  update-data:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[AUTO]')
    runs-on: ubuntu-latest
    name: Update data

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Setup pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install linux libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev libcurl4-openssl-dev libgdal-dev libproj-dev libudunits2-dev

      - name: Install R packages
        run: |
          source("src/install_packages.R")
        shell: Rscript {0}

      - name: Fetch data via WebDAV
        id: fetch_data
        env:
          WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
          WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
        run: |
          curl --fail -u "${WEBDAV_USER}:${WEBDAV_PASSWORD}" \
            "https://int-web.vmm.be/ratten/Dieren%20en%20Planten%20Waarnemingen%20INBO%20Email-nl-be.csv" \
            -o "data/raw/Dieren en Planten Waarnemingen from 2022-01-01.csv"
          curl --fail -u "${WEBDAV_USER}:${WEBDAV_PASSWORD}" \
            "https://int-web.vmm.be/ratten/Vangsten%20INBO%20Email-nl-be.csv" \
            -o "data/raw/Vangsten from 2022-01-01.csv"
        continue-on-error: true

      - name: Create issue if fetch fails
        if: steps.fetch_data.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[AUTO] Data fetch failed',
              body: `This is an automated issue.\n\nThe WebDAV data fetch step failed in the workflow run.\n\nFailed run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['automated workflow', 'fetching']
            })
            core.setFailed('Data fetch failed')

      - name: Read data
        if: steps.fetch_data.outcome == 'success'
        id: read_data
        run: |
          source("src/run_read_data.R")
        shell: Rscript {0}
        continue-on-error: true

      - name: Create issue if read data fails
        if: steps.read_data.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[AUTO] Data reading failed',
              body: `This is an automated issue.\n\nThe data reading step failed in the workflow run.\n\nFailed run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['automated workflow', 'reading']
            })
            core.setFailed('Data reading failed')

      - name: Check for read data changes
        if: steps.fetch_data.outcome == 'success' && steps.read_data.outcome == 'success'
        id: read_changes
        run: |
          if git status --porcelain | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected after fetching data."
          fi

      - name: Mapping to DwC
        if: steps.read_changes.outputs.has_changes == 'true'
        id: dwc_mapping
        run: |
          source("src/run_dwc_mapping.R")
        shell: Rscript {0}
        continue-on-error: true

      - name: Create issue if mapping fails
        if: steps.dwc_mapping.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[AUTO] Mapping failed',
              body: `This is an automated issue.\n\nThe DwC mapping step failed in the workflow run.\n\nFailed run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['automated workflow', 'mapping']
            })
            core.setFailed('DwC mapping failed')

      - name: Run tests
        if: steps.read_changes.outputs.has_changes == 'true'
        id: run_tests
        run: |
          results <- testthat::test_file("tests/test_dwc_occurrence.R")
          df <- as.data.frame(results)
          n_failures <- sum(df$failed) + sum(df$error)
          if (n_failures > 0) {
            message(sprintf("%d test(s) failed or errored.", n_failures))
            quit(status = 1, save = "no")
          }
        shell: Rscript {0}
        continue-on-error: true

      - name: Create issue if tests fail
        if: steps.run_tests.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[AUTO] Tests failed',
              body: `This is an automated issue.\n\nThe tests failed in the workflow run.\n\nFailed run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['automated workflow', 'testing']
            })
            core.setFailed('Tests failed')

      - name: Commit and push all changes
        if: steps.read_changes.outputs.has_changes == 'true' && steps.run_tests.outcome == 'success'
        uses: devops-infra/action-commit-push@f066ea8e19660de57d3d3a4a0b9d294ea2612e20 # v1.5.0
        with:
          github_token: ${{ github.token }}
          commit_prefix: "[AUTO]"
          commit_message: "Update data"
          target_branch: automatic-update
          add_timestamp: true

      - name: Get branch name
        if: steps.read_changes.outputs.has_changes == 'true' && steps.run_tests.outcome == 'success'
        id: branch_name
        run: |
          echo "name=$(git branch --show-current)" >> "$GITHUB_OUTPUT"

      - name: Create PR, add labels and merge
        if: steps.read_changes.outputs.has_changes == 'true' && steps.run_tests.outcome == 'success'
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const branchName = '${{ steps.branch_name.outputs.name }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Read PR template
            const templatePath = path.join(process.env.GITHUB_WORKSPACE, '.github/PULL_REQUEST_TEMPLATE.md');
            let prBody = '';
            try {
              prBody = fs.readFileSync(templatePath, 'utf8');
            } catch {
              prBody = 'Automated data update.';
            }
            prBody += `\n\n---\n\nWorkflow run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            
            // Create PR
            const { data: pr } = await github.rest.pulls.create({
              owner, repo,
              title: '[AUTO] Update data',
              head: branchName,
              base: 'main',
              body: prBody
            });
            
            // Add labels
            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: pr.number,
              labels: ['automated workflow', 'approved']
            });
            
            // Merge PR
            await github.rest.pulls.merge({
              owner, repo,
              pull_number: pr.number,
              commit_title: '[AUTO] Merge data update',
              merge_method: 'merge'
            });
